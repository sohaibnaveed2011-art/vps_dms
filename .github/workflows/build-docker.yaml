name: "Build and Publish Image to Docker Hub"

on:
  push:
    branches:
      - main  # Optional: Trigger automatically when you push to main
  workflow_dispatch: # Keeps your manual trigger button

jobs:
  publish_images:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: sohaib2naveed
          # Ensure this secret name matches EXACTLY what you saved in GitHub Settings
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: Build and Push Docker Image
        run: |
          docker build . -t sohaib2naveed/vps_dms:v1
          docker push sohaib2naveed/vps_dms:v1
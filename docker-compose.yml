services:
  # Laravel Web Server
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dms_app
    restart: unless-stopped
    ports:
      - "8000:8000"
      - "5173:5173"
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      - APP_URL=http://localhost:8000
      # Database
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_DATABASE=di_db
      - DB_USERNAME=naveed
      - DB_PASSWORD=nido@2025@!
      # Redis
      - REDIS_HOST=redis_cache
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    volumes:
      - ./:/app
      - /app/vendor  # Prevent host vendor from overriding container
      - /app/node_modules
    networks:
      - microservices-network
    # Override the default CMD for web server
    command: >
      sh -c "
        php artisan key:generate --force &&
        php artisan migrate --force &&
        php artisan storage:link --force &&
        php artisan serve --host=0.0.0.0 --port=8000
      "

  # Laravel Queue Worker (SAME Dockerfile, different command)
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dms_queue
    restart: unless-stopped
    environment:
      - APP_ENV=local
      - APP_DEBUG=true
      # Database
      - DB_HOST=mariadb
      - DB_PORT=3306
      - DB_DATABASE=di_db
      - DB_USERNAME=naveed
      - DB_PASSWORD=nido@2025@!
      # Redis
      - REDIS_HOST=redis_cache
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
    volumes:
      - ./:/app
      - /app/vendor
    networks:
      - microservices-network
    # Override with queue worker command
    command: >
      sh -c "
        while true; do
          echo \"Starting queue worker at \$(date)\";
          php artisan queue:work --tries=3 --sleep=3 --timeout=90 --verbose;
          echo \"Queue worker stopped, restarting in 5 seconds...\";
          sleep 5;
        done
      "
    depends_on:
      - app

networks:
  microservices-network:
    external: true
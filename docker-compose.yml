services:
  # --- REDIS SERVICE ---
  redis:
    image: redis:alpine
    container_name: redis-server
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - epos-net
  admin_db:
    image: mysql:8.0
    container_name: ${DB_CONTAINER:-epos-db-rest2}
    restart: always
    environment:
      MYSQL_DATABASE: ${DB_NAME:-dms}
      MYSQL_USER: ${DB_USER:-eposuser}
      MYSQL_PASSWORD: ${DB_PASS:-epospass}
      MYSQL_ROOT_PASSWORD: ${ROOT_PASS:-rootpass}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - epos-net

  admin:
    # Use the image from Docker Hub instead of 'build: .' for production
    image: sohaib2naveed/vps_dms:v1
    container_name: dms_admin_app
    restart: always
    tty: true
    working_dir: /app
    # REMOVED: - ./:/app (Use the code baked into the image)
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://72.60.28.176:9010
      - REDIS_HOST=redis-server  # This matches the service name above
      - REDIS_PORT=6379
      - DB_CONNECTION=mysql
      - DB_HOST=${DB_CONTAINER:-epos-db-rest2}
      - DB_PORT=3306
      - DB_DATABASE=${DB_NAME:-dms}
      - DB_USERNAME=${DB_USER:-eposuser}
      - DB_PASSWORD=${DB_PASS:-epospass}
    depends_on:
      - redis
      - admin_db
    networks:
      - epos-net

admin_queue:
    image: sohaib2naveed/vps_dms:v1
    container_name: dms_admin_queue
    restart: always
    command: php artisan queue:work --tries=3 --timeout=90
    environment:
      - APP_ENV=production
      # Database
      - DB_CONNECTION=mysql
      - DB_HOST=${DB_CONTAINER:-epos-db-rest2}
      - DB_PORT=3306
      - DB_DATABASE=${DB_NAME:-dms}
      - DB_USERNAME=${DB_USER:-eposuser}
      - DB_PASSWORD=${DB_PASS:-epospass}
      # Redis & Queue - CRITICAL ADDITIONS
      - REDIS_HOST=redis-server
      - REDIS_PORT=6379
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
    depends_on:
      - redis
      - admin_db
    networks:
      - epos-net

networks:
  epos-net:
    external: true

volumes:
  redis_data:
  dbdata:
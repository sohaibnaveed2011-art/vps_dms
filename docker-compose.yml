services:
  # --- NGINX: Entry point (Port 80) ---
  nginx:
    image: nginx:alpine
    container_name: dms_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "81:81"
      - "443:443"
    volumes:
      - ./:/app
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      admin:
        condition: service_started

  # --- MySQL Database ---
  admin_db:
    image: mysql:8.0
    container_name: admin_db
    restart: unless-stopped
    command: --default-authentication-plugin=caching_sha2_password
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-dms}
      MYSQL_USER: ${DB_USERNAME:-naveed}
      MYSQL_PASSWORD: ${DB_PASSWORD:-admin}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-admin}
    volumes:
      - dbdata:/var/lib/mysql
    ports:
      - "33077:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u$$MYSQL_USER", "-p$$MYSQL_PASSWORD"]
      timeout: 5s
      retries: 5
      interval: 10s

  # --- Redis Cache/Queue ---
  redis:
    image: redis:7
    container_name: dms_redis
    restart: unless-stopped
    volumes:
      - redisdata:/data
    ports:
      - "6379:6379"

  # --- Main Laravel App ---
  admin:
    build: .
    container_name: dms_admin_app
    restart: unless-stopped
    tty: true
    working_dir: /app
    volumes:
      - ./:/app
      - node_modules:/app/node_modules   # 🔥 Isolated node_modules
    ports:
      - "8000:8000"
      - "5173:5173"
    environment:
      # Database
      DB_HOST: admin_db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-dms}
      DB_USERNAME: ${DB_USERNAME:-naveed}
      DB_PASSWORD: ${DB_PASSWORD:-admin}
      # Redis
      REDIS_HOST: redis
      REDIS_PORT: 6379
      # File Watching (Windows/WSL)
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
    depends_on:
      admin_db:
        condition: service_healthy
      redis:
        condition: service_started

  # --- Laravel Queue Worker ---
  admin_queue:
    build: .
    container_name: dms_admin_queue
    restart: unless-stopped
    working_dir: /app
    command: php artisan queue:work --tries=1
    volumes:
      - ./:/app
      - node_modules:/app/node_modules   # 🔥 Added to match admin service
    environment:
      DB_HOST: admin_db
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-dms}
      DB_USERNAME: ${DB_USERNAME:-naveed}
      DB_PASSWORD: ${DB_PASSWORD:-admin}
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      admin_db:
        condition: service_healthy
      redis:
        condition: service_started

  # --- phpMyAdmin ---
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: dms_phpmyadmin
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: admin_db
      PMA_PORT: 3306
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-admin}
    depends_on:
      admin_db:
        condition: service_healthy

volumes:
  dbdata:
  redisdata:
  node_modules: # Dedicated volume to keep container modules separate from host modules

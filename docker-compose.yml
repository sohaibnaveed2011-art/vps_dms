services:
  admin_db:
    image: mysql:8.0
    container_name: ${DB_CONTAINER:-epos-db-rest2}
    restart: always
    environment:
      DB_CONNECTION: mysql
      MYSQL_DATABASE: ${DB_NAME:-dms}
      MYSQL_USER: ${DB_USER:-eposuser}
      MYSQL_PASSWORD: ${DB_PASS:-epospass}
      MYSQL_ROOT_PASSWORD: ${ROOT_PASS:-rootpass}
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - epos-net

  admin:
    # Use the image from Docker Hub instead of 'build: .' for production
    image: sohaib2naveed/vps_dms:v1
    container_name: dms_admin_app
    restart: always
    tty: true
    working_dir: /app
    # REMOVED: - ./:/app (Use the code baked into the image)
    ports:
      - "9010:8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_URL=http://72.60.28.176:9010
      - REDIS_HOST=redis_cache
      - DB_CONNECTION=mysql
      - DB_HOST=${DB_CONTAINER:-epos-db-rest2}
      - DB_PORT=3306
      - DB_DATABASE=${DB_NAME:-dms}
      - DB_USERNAME=${DB_USER:-eposuser}
      - DB_PASSWORD=${DB_PASS:-epospass}
    depends_on:
      - admin_db
    networks:
      - epos-net

  admin_queue:
    image: sohaib2naveed/vps_dms:v1
    container_name: dms_admin_queue
    restart: always
    command: php artisan queue:work --tries=3 --timeout=90
    # REMOVED: - ./:/app
    environment:
      - DB_HOST=${DB_CONTAINER:-epos-db-rest2}
      - DB_PORT=3306
      - DB_DATABASE=${DB_NAME:-dms}
      - DB_USERNAME=${DB_USER:-eposuser}
      - DB_PASSWORD=${DB_PASS:-epospass}
      - REDIS_HOST=redis_cache
    depends_on:
      - admin_db
    networks:
      - epos-net

networks:
  epos-net:
    external: true

volumes:
  dbdata:
    driver: local
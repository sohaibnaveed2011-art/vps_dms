services:
  # Main Laravel App
  admin:
    build: .
    container_name: dms_admin_app
    restart: unless-stopped
    tty: true
    working_dir: /app
    volumes:
      - ./:/app
      - node_modules:/app/node_modules
    ports:
      - "8000:8000"
      - "5173:5173"
    environment:
      - CHOKIDAR_USEPOLLING=true
    networks:
      - nginx-proxy-network
      - microservices-network

  # Laravel Queue Worker
  admin_queue:
    build: .
    container_name: dms_admin_queue
    restart: unless-stopped
    working_dir: /app
    command: php artisan queue:work --tries=1
    volumes:
      - ./:/app
    networks:
      - nginx-proxy-network
      - microservices-network

networks:
  nginx-proxy-network:
    external: true
  microservices-network:
    external: true

volumes:
  node_modules:
services:
  # Main Application
  app:
    image: sohaib2naveed/vps_dms:v2  # Update to your new build
    container_name: dms_admin_app
    restart: unless-stopped
    ports:
      - "9010:8000"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_NAME=DMS
      - APP_URL=http://72.60.28.176:9010
      - APP_KEY=${APP_KEY:-base64:s1dKNm4NGL9nwnFipyP8/hBSd8jAeDlSy4VnkVTPqeU=}
      
      # Database
      - DB_CONNECTION=mysql
      - DB_HOST=epos-db-rest2
      - DB_PORT=3306
      - DB_DATABASE=dms
      - DB_USERNAME=eposuser
      - DB_PASSWORD=epospass
      
      # Redis
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis-server
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      
      # Cache & Queue
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
      - QUEUE_CONNECTION=redis
      
      # RabbitMQ
      - RABBITMQ_HOST=rabbit
      - RABBITMQ_PORT=5672
      - RABBITMQ_VHOST=/
      - RABBITMQ_LOGIN=naveed
      - RABBITMQ_PASSWORD=nido@2025@!
      
      # Reverb
      - REVERB_APP_ID=614842
      - REVERB_APP_KEY=rytlcwu5ftkwp7a4rxk3
      - REVERB_APP_SECRET=muvinidosh1mnf9nu1h2
      - REVERB_HOST=72.60.28.176
      - REVERB_PORT=9080
      - REVERB_SCHEME=http
      
      - SERVICE_ROLE=app

      # Logging - CHANGED to 'single' for file logging
      - LOG_CHANNEL=single
      - LOG_LEVEL=debug
      
    volumes:
      - dms_storage:/app/storage
      - dms_public_storage:/app/public/storage
    networks:
      - epos-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    # SIMPLIFIED entrypoint
    entrypoint: ["/usr/local/bin/docker-entrypoint.sh"]
    command: ["php", "-S", "0.0.0.0:8000", "-t", "public"]

  # Queue Worker
  queue:
    image: sohaib2naveed/vps_dms:v2  # Update to your new build
    container_name: dms_admin_queue
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_NAME=DMS
      - APP_KEY=base64:s1dKNm4NGL9nwnFipyP8/hBSd8jAeDlSy4VnkVTPqeU=
      
      # Database
      - DB_CONNECTION=mysql
      - DB_HOST=epos-db-rest2
      - DB_PORT=3306
      - DB_DATABASE=dms
      - DB_USERNAME=eposuser
      - DB_PASSWORD=epospass
      
      # Redis
      - REDIS_HOST=redis-server
      - REDIS_PORT=6379
      - REDIS_PASSWORD=null
      
      # Queue
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis

      # Logging - CHANGED to 'single'
      - LOG_CHANNEL=single
      - LOG_LEVEL=debug
      
      - SERVICE_ROLE=queue
      
    entrypoint: ["/usr/local/bin/docker-entrypoint.sh"]
    command: >
      sh -c "
        php artisan queue:work --tries=3 --sleep=3 --verbose 2>&1 | tee -a /app/storage/logs/queue.log
      "
    networks:
      - epos-net
    volumes:
      - dms_storage:/app/storage
      
  # Reverb WebSocket Server
  reverb:
    image: sohaib2naveed/vps_dms:v2  # Update to your new build
    container_name: dms_admin_reverb
    restart: unless-stopped
    ports:
      - "9080:9080"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_NAME=DMS
      - APP_KEY=${APP_KEY:-base64:s1dKNm4NGL9nwnFipyP8/hBSd8jAeDlSy4VnkVTPqeU=}
      
      # Database
      - DB_CONNECTION=mysql
      - DB_HOST=epos-db-rest2
      - DB_PORT=3306
      - DB_DATABASE=dms
      - DB_USERNAME=eposuser
      - DB_PASSWORD=epospass
      
      # Redis
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis-server
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      
      # Reverb
      - REVERB_APP_ID=614842
      - REVERB_APP_KEY=rytlcwu5ftkwp7a4rxk3
      - REVERB_APP_SECRET=muvinidosh1mnf9nu1h2
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=9080
      - REVERB_SCHEME=http

      # Logging - CHANGED to 'single'
      - LOG_CHANNEL=single
      - LOG_LEVEL=debug
         
      - SERVICE_ROLE=reverb
      
    entrypoint: ["/usr/local/bin/docker-entrypoint.sh"]
    command: >
      sh -c "
        echo '=== Reverb Server Starting ===' | tee -a /app/storage/logs/reverb.log;
        echo 'Waiting for Redis...' | tee -a /app/storage/logs/reverb.log;
        for i in 1 2 3 4 5; do
          if php artisan tinker --execute=\"try { Redis::ping(); echo 'OK'; } catch(Exception \$e) { exit(1); }\" 2>/dev/null | grep -q 'OK'; then
            echo '✅ Redis ready' | tee -a /app/storage/logs/reverb.log;
            break;
          fi;
          echo \"Waiting for Redis... (\$i/5)\" | tee -a /app/storage/logs/reverb.log;
          sleep 3;
        done;
        exec php artisan reverb:start --host=0.0.0.0 --port=9080 --debug 2>&1 | tee -a /app/storage/logs/reverb.log
      "
    networks:
      - epos-net

  # Scheduler for Cron Jobs
  scheduler:
    image: sohaib2naveed/vps_dms:v2  # Update to your new build
    container_name: dms_admin_scheduler
    restart: unless-stopped
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_NAME=DMS
      - APP_KEY=${APP_KEY:-base64:s1dKNm4NGL9nwnFipyP8/hBSd8jAeDlSy4VnkVTPqeU=}
      
      # Database
      - DB_CONNECTION=mysql
      - DB_HOST=epos-db-rest2
      - DB_PORT=3306
      - DB_DATABASE=dms
      - DB_USERNAME=eposuser
      - DB_PASSWORD=epospass
      
      # Redis
      - REDIS_CLIENT=phpredis
      - REDIS_HOST=redis-server
      - REDIS_PASSWORD=null
      - REDIS_PORT=6379
      
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
      
      - SERVICE_ROLE=scheduler

      # Logging - CHANGED to 'single'
      - LOG_CHANNEL=single
      - LOG_LEVEL=debug   
      
    entrypoint: ["/usr/local/bin/docker-entrypoint.sh"]
    command: >
      sh -c "
        echo '=== Scheduler Starting ===' | tee -a /app/storage/logs/scheduler.log;
        while true; do
          echo \"Running scheduler at \$(date)\" | tee -a /app/storage/logs/scheduler.log;
          php artisan schedule:run --verbose --no-interaction 2>&1 | tee -a /app/storage/logs/scheduler.log;
          echo 'Sleeping for 60 seconds...' | tee -a /app/storage/logs/scheduler.log;
          sleep 60;
        done
      "
    networks:
      - epos-net

networks:
  epos-net:
    external: true
    name: epos-net

volumes:
  dms_storage:
    external: false
  dms_public_storage:
    external: false